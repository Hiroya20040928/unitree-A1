controller_frequency: 4.0
recovery_behavior_enabled: false
clearing_rotation_allowed: false

TrajectoryPlannerROS:
   max_vel_x: 0.75
   min_vel_x: 0.05
   max_vel_y: 0.0
   min_vel_y: 0.0

   max_vel_theta: 0.24
   min_vel_theta: -0.24
   min_in_place_vel_theta: 0.05

   escape_vel: -0.05

   acc_lim_x: 0.35
   acc_lim_y: 0.0
   acc_lim_theta: 0.20

   holonomic_robot: false

   yaw_goal_tolerance: 3.14
   xy_goal_tolerance: 0.75
   latch_xy_goal_tolerance: true

   pdist_scale: 0.85
   gdist_scale: 0.65
   meter_scoring: true

   heading_lookahead: 0.45
   heading_scoring: false
   heading_scoring_timestep: 0.8

   occdist_scale: 0.08
   oscillation_reset_dist: 0.50

   publish_cost_grid_pc: false
   prune_plan: true

   sim_time: 1.2
   sim_granularity: 0.05
   angular_sim_granularity: 0.05

   vx_samples: 7
   vy_samples: 1
   vtheta_samples: 9

   dwa: true
   simple_attractor: false
