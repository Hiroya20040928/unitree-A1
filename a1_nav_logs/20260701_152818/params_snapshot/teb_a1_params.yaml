TebLocalPlannerROS:
  odom_topic: /odom
  map_frame: odom

  teb_autosize: true
  dt_ref: 0.30
  dt_hysteresis: 0.10
  global_plan_overwrite_orientation: true
  allow_init_with_backwards_motion: false
  max_global_plan_lookahead_dist: 2.5
  global_plan_prune_distance: 0.5
  feasibility_check_no_poses: 5

  max_vel_x: 0.75
  max_vel_x_backwards: 0.0
  max_vel_y: 0.0
  max_vel_theta: 0.24

  acc_lim_x: 0.35
  acc_lim_y: 0.0
  acc_lim_theta: 0.24

  min_turning_radius: 0.0

  footprint_model:
    type: "polygon"
    vertices: [[-0.36, 0.24], [0.36, 0.24], [0.36, -0.24], [-0.36, -0.24]]

  xy_goal_tolerance: 0.55
  yaw_goal_tolerance: 3.14
  free_goal_vel: false
  complete_global_plan: true

  min_obstacle_dist: 0.28
  inflation_dist: 0.40
  include_costmap_obstacles: true
  costmap_obstacles_behind_robot_dist: 0.6
  obstacle_poses_affected: 20

  no_inner_iterations: 4
  no_outer_iterations: 3
  optimization_activate: true
  optimization_verbose: false

  penalty_epsilon: 0.05
  weight_max_vel_x: 5.0
  weight_max_vel_theta: 2.0
  weight_acc_lim_x: 2.0
  weight_acc_lim_theta: 1.0
  weight_kinematics_nh: 1000.0
  weight_kinematics_forward_drive: 50.0
  weight_kinematics_turning_radius: 1.0
  weight_optimaltime: 1.0
  weight_obstacle: 60.0
  weight_dynamic_obstacle: 1.0
  weight_adapt_factor: 2.0

  enable_homotopy_class_planning: false
