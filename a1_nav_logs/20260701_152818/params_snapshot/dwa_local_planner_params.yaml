DWAPlannerROS:
  max_vel_x: 0.28
  min_vel_x: 0.0
  max_vel_trans: 0.28
  min_vel_trans: 0.02
  max_vel_y: 0.0
  min_vel_y: 0.0
  max_vel_theta: 0.9
  min_vel_theta: 0.35
  acc_lim_x: 0.30
  acc_lim_y: 0.0
  acc_lim_theta: 0.80

  holonomic_robot: false
  latch_xy_goal_tolerance: false
  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.20

  sim_time: 1.0
  sim_granularity: 0.05
  angular_sim_granularity: 0.1
  vx_samples: 8
  vy_samples: 1
  vtheta_samples: 20

  path_distance_bias: 24.0
  goal_distance_bias: 18.0
  occdist_scale: 0.10
  forward_point_distance: 0.20
  stop_time_buffer: 0.20
  scaling_speed: 0.25
  max_scaling_factor: 0.20
  oscillation_reset_dist: 0.05
  prune_plan: true
