TebLocalPlannerROS:
  odom_topic: slamware_ros_sdk_server_node/odom

  teb_autosize: true
  dt_ref: 0.3
  dt_hysteresis: 0.1
  global_plan_overwrite_orientation: true
  allow_init_with_backwards_motion: true
  global_plan_viapoint_sep: -1.0
  via_points_ordered: true
  max_global_plan_lookahead_dist: 2.0
  global_plan_prune_distance: 1.0
  feasibility_check_no_poses: 5

  max_vel_x: 0.35
  max_vel_x_backwards: 0.20
  max_vel_y: 0.0
  max_vel_theta: 0.9
  acc_lim_x: 0.30
  acc_lim_theta: 0.80
  min_turning_radius: 0.0

  footprint_model:
    type: "polygon"
    vertices: [[-0.4, 0.25], [0.4, 0.25], [0.4, -0.25], [-0.4, -0.25]]

  xy_goal_tolerance: 0.15
  yaw_goal_tolerance: 0.20
  free_goal_vel: false

  min_obstacle_dist: 0.18
  inflation_dist: 0.30
  include_costmap_obstacles: true
  costmap_obstacles_behind_robot_dist: 0.5
  obstacle_poses_affected: 20
  costmap_converter_plugin: ""

  no_inner_iterations: 4
  no_outer_iterations: 3
  optimization_activate: true
  optimization_verbose: false
  penalty_epsilon: 0.05
  weight_max_vel_x: 5.0
  weight_max_vel_theta: 2.0
  weight_acc_lim_x: 1.0
  weight_acc_lim_theta: 1.0
  weight_kinematics_nh: 1000.0
  weight_kinematics_forward_drive: 1.0
  weight_kinematics_turning_radius: 1.0
  weight_optimaltime: 1.0
  weight_obstacle: 50.0
  weight_viapoint: 20.0
  weight_dynamic_obstacle: 1.0
  weight_adapt_factor: 2.0

  enable_homotopy_class_planning: true
  enable_multithreading: true
  simple_exploration: false
  max_number_classes: 3
  selection_cost_hysteresis: 1.0
  selection_obst_cost_scale: 1.0
  selection_viapoint_cost_scale: 2.0
  selection_alternative_time_cost: false
  roadmap_graph_no_samples: 12
  roadmap_graph_area_width: 4.0
  h_signature_prescaler: 0.5
  h_signature_threshold: 0.1
  obstacle_keypoint_offset: 0.1
  obstacle_heading_threshold: 0.45
  visualize_hc_graph: false

